layout: sidebar
style: light

user: 
  hireable: false
  
plugins:
  - jekyll-octicons
  - jekyll-github-metadata
  - jemoji

permalink: /:year/:month/:day/:title/

defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
      type: "posts"
    values:
      layout: "post"

projects:
  sort_by: pushed
  # sort_by options:
  #   - pushed
  #   - stars
  limit: 9
  exclude:
    archived: true
    forks: true
    projects:
     - nanowar-modplayer
     - defold-astar-examples
     - modplayer-html5-example 

social_media:
  website: http://www.selimanac.space
  twitter: selimanac
  youtube: selimanac
  instagram: selimanac
  behance: selimanac